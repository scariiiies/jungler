<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Your Fish!</title>
    
    <style>
        /* Basic styling to center everything on your screen */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 300px;
        }

        /* Form Layout */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }

        input {
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        button {
            padding: 12px;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Smooth CSS Fade Animation */
        .hidden {
            opacity: 0;
            display: none;
            transition: opacity 1s ease-in-out;
        }

        .fade-in {
            display: block;
            opacity: 1;
            font-size: 1.4rem;
            font-weight: bold;
            color: #28a745; /* Clean green text for the milestone message */
            margin-top: 10px;
        }
    </style>
</head>

        </div>
